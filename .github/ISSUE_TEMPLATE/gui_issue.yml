name: Issue or feature request related to the GUI
description: Any report, issue or feature request related to the GUI
body:
- type: checkboxes
  id: acknowledgement
  attributes:
    label: Issues, reports or feature requests related to the qbit GUI should be opened here only when they apply to this repository
    description: Report GUI issues here only when they apply to this repository.
    options:
      - label: I still think this issue should be opened here
        required: true
- type: textarea
  id: gui-request
  attributes:
    label: Report
  validations:
    required: true
