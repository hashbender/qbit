name: Lint Image Prewarm

on:
  push:
    branches:
      - main
    paths:
      - .python-version
      - ci/lint_imagefile
      - ci/test/00_setup_env_base_image.sh
      - ci/lint/**
      - ci/retry/retry
      - .github/actions/configure-docker/**
      - .github/workflows/lint-image-prewarm.yml
  schedule:
    - cron: '45 0 * * *'
  workflow_dispatch:

concurrency:
  group: lint-image-prewarm-${{ github.ref }}
  cancel-in-progress: true

env:
  CONTAINER_NAME: "bitcoin-linter-main"
  CI_IMAGE_REGISTRY_PREFIX: ${{ github.repository == 'Qbit-Org/qbit' && 'qbit-ci-autoscaler:5000/qbit-cache' || 'docker.io/library' }}
  CI_ENFORCE_INTERNAL_REGISTRY: ${{ github.repository == 'Qbit-Org/qbit' && '1' || '0' }}
  CI_BUILDKIT_DNS_NAMESERVERS: ${{ github.repository == 'Qbit-Org/qbit' && '100.100.100.100,1.1.1.1,8.8.8.8' || '' }}
  CI_BUILDKIT_DNS_SEARCH_DOMAINS: ${{ github.repository == 'Qbit-Org/qbit' && 'tailfa7aa.ts.net,localdomain' || '' }}

jobs:
  prewarm:
    name: Prewarm lint image cache
    if: ${{ github.repository == 'Qbit-Org/qbit' && github.ref_name == github.event.repository.default_branch }}
    runs-on: tenki-standard-large-plus-16c-32g
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Configure Docker
        uses: ./.github/actions/configure-docker
        with:
          cache-provider: gha
          cache-from-scopes: bitcoin-linter-main
          cache-to-scopes: bitcoin-linter-main
          cache-write-policy: always
          load-image: false

      - name: Build lint image cache
        run: |
          set -o xtrace
          source ./ci/test/00_setup_env_base_image.sh
          ci_set_base_image_name_tag "ubuntu:24.04"
          read -r -a docker_build_cache_args <<< "$DOCKER_BUILD_CACHE_ARG"
          docker buildx build -t "$CONTAINER_NAME" "${docker_build_cache_args[@]}" --build-arg "CI_IMAGE_NAME_TAG=${CI_IMAGE_NAME_TAG}" --file "./ci/lint_imagefile" .
