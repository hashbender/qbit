name: Core Checks

on:
  pull_request:
    branches:
      - main
      - 0.1.x
      - develop
  push:
    branches:
      - main
      - 0.1.x
      - develop
  merge_group:
    branches:
      - main
      - 0.1.x
      - develop

permissions:
  contents: read

concurrency:
  group: core-checks-${{ github.event_name != 'pull_request' && github.run_id || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  classify-changes:
    name: classify validation profile
    runs-on: tenki-standard-medium-4c-8g
    outputs:
      profile: ${{ steps.classify.outputs.profile }}
      release_policy_only: ${{ steps.classify.outputs.release_policy_only }}
      source_validation_required: ${{ steps.classify.outputs.source_validation_required }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Write changed file list
        id: changed-files
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          BASE_REF: ${{ github.base_ref || github.event.merge_group.base_ref }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'main' }}
        run: |
          set -euo pipefail

          changed_files="${RUNNER_TEMP}/changed-files.txt"
          : > "${changed_files}"

          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            if [[ -z "${BASE_SHA}" ]]; then
              echo "::error::Pull request base SHA is unavailable."
              exit 1
            fi
            git diff --name-only "${BASE_SHA}...HEAD" > "${changed_files}"
          elif [[ "${EVENT_NAME}" == "merge_group" ]]; then
            base_branch="${BASE_REF#refs/heads/}"
            if [[ -z "${base_branch}" ]]; then
              echo "::error::Merge-group base branch is unavailable."
              exit 1
            fi
            git fetch --no-tags --prune origin "+refs/heads/${base_branch}:refs/remotes/origin/${base_branch}"
            git diff --name-only "origin/${base_branch}...HEAD" > "${changed_files}"
          elif [[ "${EVENT_NAME}" == "push" ]]; then
            if [[ -n "${BEFORE_SHA}" && ! "${BEFORE_SHA}" =~ ^0+$ ]]; then
              git diff --name-only "${BEFORE_SHA}..HEAD" > "${changed_files}"
            else
              git fetch --no-tags --prune origin "${DEFAULT_BRANCH}"
              merge_base="$(git merge-base "origin/${DEFAULT_BRANCH}" HEAD 2>/dev/null || true)"
              if [[ -n "${merge_base}" ]]; then
                git diff --name-only "${merge_base}...HEAD" > "${changed_files}"
              else
                git diff-tree --no-commit-id --name-only -r HEAD > "${changed_files}"
              fi
            fi
          else
            git diff-tree --no-commit-id --name-only -r HEAD > "${changed_files}"
          fi

          cat "${changed_files}"
          echo "changed_files=${changed_files}" >> "$GITHUB_OUTPUT"

      - name: Classify validation profile
        id: classify
        run: |
          python3 ci/checks/classify_merge_profile.py \
            --changed-files "${{ steps.changed-files.outputs.changed_files }}" \
            --github-output "$GITHUB_OUTPUT"

  build-smoke:
    name: build smoke
    needs: classify-changes
    if: ${{ needs.classify-changes.outputs.source_validation_required == 'true' }}
    runs-on: tenki-standard-medium-4c-8g
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkgconf \
            python3 \
            libboost-dev \
            libevent-dev \
            libsqlite3-dev

      - name: Configure build
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_GUI=OFF \
            -DBUILD_TESTS=OFF \
            -DBUILD_BENCH=OFF \
            -DBUILD_FUZZ_BINARY=OFF \
            -DENABLE_IPC=OFF \
            -DWITH_ZMQ=OFF \
            -DWITH_USDT=OFF \
            -DWITH_CCACHE=OFF

      - name: Build daemon and CLI
        run: cmake --build build --target qbitd qbit-cli -j"$(nproc)"

      - name: Smoke binaries
        run: |
          test -x build/bin/qbitd
          test -x build/bin/qbit-cli
          build/bin/qbitd -version
          build/bin/qbit-cli -version

  focused-unit-suites:
    name: focused unit suites
    needs: classify-changes
    if: ${{ needs.classify-changes.outputs.source_validation_required == 'true' }}
    runs-on: tenki-standard-medium-4c-8g
    timeout-minutes: 75

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkgconf \
            python3 \
            libboost-dev \
            libevent-dev \
            libsqlite3-dev

      - name: Configure unit build
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_GUI=OFF \
            -DBUILD_TESTS=ON \
            -DBUILD_BENCH=OFF \
            -DBUILD_FUZZ_BINARY=OFF \
            -DENABLE_IPC=OFF \
            -DWITH_ZMQ=OFF \
            -DWITH_USDT=OFF \
            -DWITH_CCACHE=OFF

      - name: Build unit test binary
        run: cmake --build build --target test_bitcoin -j"$(nproc)"

      - name: Run focused unit suites
        run: |
          suites=(
            pqc_tests
            asert_tests
            pow_tests
            subsidy_tests
            script_p2mr_tests
            key_io_p2mr_tests
            descriptor_p2mr_tests
            getarg_tests
            rpc_tests
            orphan_metrics_tests
          )
          for suite in "${suites[@]}"; do
            build/bin/test_qbit --run_test="${suite}" --catch_system_error=no --log_level=test_suite
          done

  functional-smoke:
    name: functional smoke
    needs: classify-changes
    # Canonical repo only: the fork's tenki runners can't serve RPC on IPv6 ::1,
    # which interface_bitcoin_cli.py requires.
    if: ${{ github.repository == 'Qbit-Org/qbit' && github.repository == 'Qbit-Org/qbit' && github.repository == 'Qbit-Org/qbit' && github.repository == 'Qbit-Org/qbit' && needs.classify-changes.outputs.source_validation_required == 'true' }}
    runs-on: tenki-standard-medium-4c-8g
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkgconf \
            python3 \
            libboost-dev \
            libevent-dev \
            libsqlite3-dev

      - name: Configure functional build
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_GUI=OFF \
            -DBUILD_TESTS=ON \
            -DBUILD_BENCH=OFF \
            -DBUILD_FUZZ_BINARY=OFF \
            -DENABLE_IPC=OFF \
            -DWITH_ZMQ=OFF \
            -DWITH_USDT=OFF \
            -DWITH_CCACHE=OFF

      - name: Build functional test binaries
        run: cmake --build build --target qbitd qbit-cli bitcoin-tx bitcoin-util -j"$(nproc)"

      - name: Run functional smoke
        run: |
          ulimit -n 10240 || true
          build/test/functional/test_runner.py \
            --jobs "$(nproc)" \
            --ci \
            --quiet \
            --tmpdirprefix="${RUNNER_TEMP}" \
            --combinedlogslen=2000 \
            --timeout-factor=2 \
            feature_config_args.py \
            feature_help.py \
            interface_bitcoin_cli.py \
            mining_basic.py \
            mempool_dust.py \
            p2p_handshake.py \
            rpc_whitelist.py \
            feature_orphan_metrics.py

  release-validator-tests:
    name: release validator tests
    needs: classify-changes
    if: ${{ needs.classify-changes.outputs.source_validation_required == 'true' }}
    runs-on: tenki-standard-medium-4c-8g
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect release file changes
        id: release_changes
        run: |
          changed_files="$(mktemp)"

          if [[ "${{ github.event_name }}" == "push" ]]; then
            before="${{ github.event.before }}"
            if [[ -z "${before}" || "${before}" =~ ^0+$ ]]; then
              git fetch --no-tags --prune origin main
              merge_base="$(git merge-base origin/main HEAD 2>/dev/null || true)"
              if [[ -n "${merge_base}" ]]; then
                git diff --name-only "${merge_base}" HEAD > "${changed_files}"
              else
                git diff-tree --no-commit-id --name-only -r HEAD > "${changed_files}"
              fi
            elif ! git diff --name-only "${before}" HEAD > "${changed_files}"; then
              echo "Could not diff push range; running release validator tests."
              echo "changed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          else
            base_ref="${{ github.base_ref || github.event.merge_group.base_ref }}"
            base_branch="${base_ref#refs/heads/}"
            if [[ -z "${base_branch}" ]]; then
              echo "Could not determine event base branch; running release validator tests."
              echo "changed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            git fetch --no-tags --prune origin "+refs/heads/${base_branch}:refs/remotes/origin/${base_branch}"
            if ! git diff --name-only "origin/${base_branch}...HEAD" > "${changed_files}"; then
              echo "Could not diff against origin/${base_branch}; running release validator tests."
              echo "changed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          release_process_re='contrib/release-''process/'
          release_sanitize_re='contrib/release-''sanitize/'
          release_publish_re='[.]github/workflows/release-publish[.]yml$'
          release_path_re="^(ci/release/|contrib/guix/|${release_process_re}|${release_sanitize_re}|${release_publish_re})"
          if grep -E "${release_path_re}" "${changed_files}"; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No release validator paths changed."
          fi

      - name: Install release test dependencies
        if: steps.release_changes.outputs.changed == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y gpg

      - name: Run release validator tests
        if: steps.release_changes.outputs.changed == 'true'
        run: |
          release_process_dir='contrib/release-''process'
          release_sanitize_dir='contrib/release-''sanitize'
          # Retained public release tests: present in both the source tree and
          # sanitized public snapshots, and depended on by release-publish.yml,
          # so a missing file is a regression and must fail the check.
          required_tests=(
            ci/release/test_validate_builder_attestations.py
            ci/release/test_validate_key_metadata.py
            ci/release/test_validate_release_artifacts.py
            ci/release/test_verify_testnet_release_posture.py
            contrib/guix/test_build_config.py
          )
          # Tests for tooling the sanitizer strips from public snapshots: run
          # when present (source tree), skip when intentionally absent (public).
          optional_tests=(
            "${release_process_dir}/test_release_signing_helpers.py"
            "${release_process_dir}/test_verify_testnet_release_posture.py"
            "${release_sanitize_dir}/test_export_public_snapshot.py"
          )
          for test_file in "${required_tests[@]}"; do
            if [[ ! -f "${test_file}" ]]; then
              echo "::error::Retained release test ${test_file} is missing; it is kept in public snapshots and required by release-publish.yml." >&2
              exit 1
            fi
            python3 "${test_file}"
          done
          for test_file in "${optional_tests[@]}"; do
            if [[ ! -f "${test_file}" ]]; then
              echo "Skipping ${test_file}; it is stripped from this checkout."
              continue
            fi
            python3 "${test_file}"
          done

  core-checks-gate:
    name: 'Core Checks Gate'
    runs-on: tenki-standard-medium-4c-8g
    needs:
      - classify-changes
      - build-smoke
      - focused-unit-suites
      - functional-smoke
      - release-validator-tests
    # Aggregate core check input for Required Merge Gate. Source jobs are skipped
    # only for the strict release-policy profile; every other profile requires
    # the core jobs to complete successfully.
    if: ${{ always() }}
    steps:
      - name: Check core check results
        env:
          CLASSIFY_CHANGES_RESULT: ${{ needs.classify-changes.result }}
          VALIDATION_PROFILE: ${{ needs.classify-changes.outputs.profile }}
          SOURCE_VALIDATION_REQUIRED: ${{ needs.classify-changes.outputs.source_validation_required }}
          BUILD_SMOKE_RESULT: ${{ needs.build-smoke.result }}
          FOCUSED_UNIT_SUITES_RESULT: ${{ needs.focused-unit-suites.result }}
          FUNCTIONAL_SMOKE_RESULT: ${{ needs.functional-smoke.result }}
          RELEASE_VALIDATOR_TESTS_RESULT: ${{ needs.release-validator-tests.result }}
        run: |
          set -euo pipefail

          failed=0
          check_result() {
            local name="$1"
            local result="$2"

            echo "${name}: ${result}"
            if [[ "${result}" != "success" && "${result}" != "skipped" ]]; then
              echo "::error title=Core Checks failed::${name} result was ${result}."
              failed=1
            fi
          }

          check_result "classify validation profile" "${CLASSIFY_CHANGES_RESULT}"

          if [[ "${SOURCE_VALIDATION_REQUIRED}" != "true" ]]; then
            echo "Validation profile ${VALIDATION_PROFILE} does not require source core checks."
            exit "${failed}"
          fi

          check_result "build smoke" "${BUILD_SMOKE_RESULT}"
          check_result "focused unit suites" "${FOCUSED_UNIT_SUITES_RESULT}"
          check_result "functional smoke" "${FUNCTIONAL_SMOKE_RESULT}"
          check_result "release validator tests" "${RELEASE_VALIDATOR_TESTS_RESULT}"

          exit "${failed}"
